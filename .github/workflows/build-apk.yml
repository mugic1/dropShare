name: Convert Web to APK

on:
  push:
    branches:
      - main  # Ya aapki jo bhi default branch ho (e.g., master)

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18

    - name: Install Dependencies
      run: npm install

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # Website ko Android project me convert karna
    - name: Initialize Capacitor Android
      run: |
        npx cap npx cap add android
        npx cap sync android

    # APK Compile karna
    - name: Build Android APK
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug

    # APK ko download ke liye upload karna
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: website-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        
